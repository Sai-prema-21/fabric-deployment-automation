name: Fabric Dev to Prod Deployment

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  deploy-dev-to-test:
    runs-on: windows-latest
    env:
      FABRIC_CLIENT_ID: ${{ secrets.CLIENT_ID }}
      FABRIC_TENANT_ID: ${{ secrets.TENANT_ID }}
      FABRIC_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - name: Debug Check Secrets
        shell: pwsh
        run: |
          Write-Host "Client ID length: $($env:FABRIC_CLIENT_ID.Length)"
          Write-Host "Tenant ID length: $($env:FABRIC_TENANT_ID.Length)"
          Write-Host "Secret length: $($env:FABRIC_CLIENT_SECRET.Length)"

      - name: Deploy Dev to Test
        shell: pwsh
        run: |
          $baseUrl = "https://api.fabric.microsoft.com/v1"

          az login --service-principal --username $env:FABRIC_CLIENT_ID --password $env:FABRIC_CLIENT_SECRET --tenant $env:FABRIC_TENANT_ID --allow-no-subscriptions | Out-Null
          if ($LASTEXITCODE -ne 0) {
              Write-Host "az login failed!" -ForegroundColor Red
              exit 1
          }

          $token = az account get-access-token --resource https://api.fabric.microsoft.com --query accessToken -o tsv
          $fabricHeaders = @{ "Authorization" = "Bearer $token" }

          $pipelines = (Invoke-RestMethod -Headers $fabricHeaders -Uri "$baseUrl/deploymentPipelines" -Method GET).value
          $pipeline = $pipelines | Where-Object { $_.displayName -eq "Sales Pipeline" }
          if (-not $pipeline) {
              Write-Host "Pipeline not found!" -ForegroundColor Red
              exit 1
          }
          $pipelineId = $pipeline.id
          Write-Host "Found pipeline: $($pipeline.displayName) ($pipelineId)" -ForegroundColor Green

          $stages = (Invoke-RestMethod -Headers $fabricHeaders -Uri "$baseUrl/deploymentPipelines/$pipelineId/stages" -Method GET).value
          $sourceStage = $stages | Where-Object { $_.displayName -eq "Development" }
          $targetStage = $stages | Where-Object { $_.displayName -eq "Test" }

          $deployBody = @{ sourceStageId = $sourceStage.id; targetStageId = $targetStage.id; note = "Auto deploy via GitHub Actions" } | ConvertTo-Json

          Write-Host "Deploying from Development to Test..." -ForegroundColor Green
          $deployResponse = Invoke-WebRequest -Headers $fabricHeaders -Uri "$baseUrl/deploymentPipelines/$pipelineId/deploy" -Method POST -Body $deployBody -ContentType "application/json"
          $operationId = $deployResponse.Headers["x-ms-operation-id"]
          Write-Host "Operation ID: $operationId" -ForegroundColor Green

          do {
            Start-Sleep -Seconds 10
            $operation = Invoke-RestMethod -Headers $fabricHeaders -Uri "$baseUrl/operations/$operationId" -Method GET
            Write-Host "Status: $($operation.status)"
          } while ($operation.status -in @("NotStarted", "Running"))

          if ($operation.status -ne "Succeeded") {
              Write-Host "Deployment failed:" -ForegroundColor Red
              $operation | ConvertTo-Json -Depth 5
              exit 1
          }
          Write-Host "Deployment succeeded!" -ForegroundColor Green

  deploy-test-to-prod:
    needs: deploy-dev-to-test
    runs-on: windows-latest
    environment: Production
    env:
      FABRIC_CLIENT_ID: ${{ secrets.CLIENT_ID }}
      FABRIC_TENANT_ID: ${{ secrets.TENANT_ID }}
      FABRIC_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - name: Deploy Test to Production
        shell: pwsh
        run: |
          $baseUrl = "https://api.fabric.microsoft.com/v1"

          az login --service-principal --username $env:FABRIC_CLIENT_ID --password $env:FABRIC_CLIENT_SECRET --tenant $env:FABRIC_TENANT_ID --allow-no-subscriptions | Out-Null
          if ($LASTEXITCODE -ne 0) {
              Write-Host "az login failed!" -ForegroundColor Red
              exit 1
          }

          $token = az account get-access-token --resource https://api.fabric.microsoft.com --query accessToken -o tsv
          $fabricHeaders = @{ "Authorization" = "Bearer $token" }

          $pipelines = (Invoke-RestMethod -Headers $fabricHeaders -Uri "$baseUrl/deploymentPipelines" -Method GET).value
          $pipeline = $pipelines | Where-Object { $_.displayName -eq "Sales Pipeline" }
          if (-not $pipeline) {
              Write-Host "Pipeline not found!" -ForegroundColor Red
              exit 1
          }
          $pipelineId = $pipeline.id
          Write-Host "Found pipeline: $($pipeline.displayName) ($pipelineId)" -ForegroundColor Green

          $stages = (Invoke-RestMethod -Headers $fabricHeaders -Uri "$baseUrl/deploymentPipelines/$pipelineId/stages" -Method GET).value
          $sourceStage = $stages | Where-Object { $_.displayName -eq "Test" }
          $targetStage = $stages | Where-Object { $_.displayName -eq "Production" }

          $deployBody = @{ sourceStageId = $sourceStage.id; targetStageId = $targetStage.id; note = "Auto deploy via GitHub Actions" } | ConvertTo-Json

          Write-Host "Deploying from Test to Production..." -ForegroundColor Green
          $deployResponse = Invoke-WebRequest -Headers $fabricHeaders -Uri "$baseUrl/deploymentPipelines/$pipelineId/deploy" -Method POST -Body $deployBody -ContentType "application/json"
          $operationId = $deployResponse.Headers["x-ms-operation-id"]
          Write-Host "Operation ID: $operationId" -ForegroundColor Green

          do {
            Start-Sleep -Seconds 10
            $operation = Invoke-RestMethod -Headers $fabricHeaders -Uri "$baseUrl/operations/$operationId" -Method GET
            Write-Host "Status: $($operation.status)"
          } while ($operation.status -in @("NotStarted", "Running"))

          if ($operation.status -ne "Succeeded") {
              Write-Host "Deployment failed:" -ForegroundColor Red
              $operation | ConvertTo-Json -Depth 5
              exit 1
          }
          Write-Host "Deployment succeeded!" -ForegroundColor Green
